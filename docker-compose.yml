version: "3"
services:
  leapcert-front:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        environment: production
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://98.90.231.160:6030/api/}
    image: leapcert-front:${IMAGE_TAG:-latest}
    container_name: leapcert-front
    ports:
      - "3030:3000"
    restart: always
    networks:
      - leapcert-network

networks:
  leapcert-network:
    external: true
